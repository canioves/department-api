services:
  postgres:
    container_name: department-database-container
    image: postgres:18
    environment:
      POSTGRES_DB: department-db
      POSTGRES_USER: canioves
      POSTGRES_PASSWORD: c23315Ht5
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgresdb-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - postgres
  app:
    container_name: department-app-container
    build: .
    depends_on:
      - postgres
    environment:
      DB_HOST: ${DB_HOST_DOCKER}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_PROT: ${APP_PORT}
      GO_ENV: docker
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}"
    networks:
      - postgres

volumes:
  postgresdb-data:

networks:
  postgres:
    driver: bridge